problem_solution:
  problemHeading: "The Payment Gridlock Problem"
  problemSubheading: "\"I can't pay you, because I've not been paid\" — we've all heard it. Local Loop members are building a better way."
  problems:
    - icon: "clock"
      title: "Late Payments"
      description: "UK SMEs get paid an average of 7 days late."
    - icon: "trending-down"
      title: "Cash Flow Crunch"
      description: "Around 80% of UK small business failures can be attributed to cash flow issues."
    - icon: "alert-circle"
      title: "Unpredictable Income"
      description: "Without reliable payment timing, planning and growth become nearly impossible."
  solutionHeading: "The"
  solutionHeadingHighlight: "Local Loop"
  solutionHeadingEnd: "Solution"
  solutionSubheading: "A low cost, low effort business club where safely and securely sharing invoice data delivers direct improvements to your accounts."
  solutionStrapline: "Insight Membership is free. It works like this."
  solutions:
    - icon: "user-plus"
      title: "Make an account"
      subtitle: "2 minutes"
      description: "Business email address and password is all you'll need."
    - icon: "plug"
      title: "Connect your accounts system"
      subtitle: "5 minutes"
      description: "We integrate seamlessly with Xero and QuickBooks. PDF uploads also work."
    - icon: "cog"
      title: "We do the rest!"
      description: "We'll send regular business intelligence reports and let you know when we think your business will benefit from paid membership."

