lead_magnet:
  heading: "Getting Paid on Time"
  subheadingItalic: "— and what to do if you're not —"
  description: "From getting yourself set up, to communicating effectively with your customers, to problem solving for the tough cases. With expert advice, straightforward examples and links to resources, this guide will give you the tools, the understanding, and the mindset to help get you paid on time — and minimise the damage when payments do come in late."
  formPlaceholder: "Enter your business email"
  formButtonText: "Get the Guide"
  successMessage: "Thanks! Check your email for the guide."
  privacyText: "We respect your privacy. Unsubscribe at any time."

join:
  heading: "Join Local Loop"
  platformURL: "https://demo.localloop-merseyside.co.uk/signup"
  newsletterAction: "https://mailygo-production.up.railway.app/"
  welcome:
    text: "To validate your business for membership of the Local Loop Clearing Club, we just need to check a few things. A short sequence of questions with yes-no answers will very quickly get you to a result."
    ctaText: "Begin"
  inArea:
    question: "Is your business based in the wider Merseyside area?"
  buying:
    question: "Does your business buy locally on trade credit terms?"
    subtext: "Answer yes if even 10% of your buying is like this."
  selling:
    question: "Does your business sell locally on trade credit terms?"
    subtext: "Answer yes if even 10% of your selling is like this."
  stage2:
    text: "Thank you. Local Loop, as it currently works, won't serve your business, but later this year we'll roll out an additional service which could well work for you. Would you like to join now so that we can make sure you're on board when that service launches?"
  wonderful:
    text: "That's great. You're a prime candidate for Local Loop membership. Please carry on to Join Local Loop."
    ctaText: "Join Local Loop"
  outOfArea:
    text: "We're very sorry your business is not eligible to join Local Loop Merseyside. If you'd still like to follow our progress, do give us your email address and we'll send you occasional newsletters from which you can unsubscribe at any time."
  additionalQs:
    text: "We're very sorry your business is unlikely to immediately get any value from Local Loop membership. If you'd still like to follow our progress, do give us your email address and we'll send you occasional newsletters from which you can unsubscribe at any time."
  newsletter:
    placeholder: "Enter your business email"
    ctaText: "Subscribe"
    successMessage: "Thanks! We'll keep you updated."

contact:
  heading: "Get In Touch"
  description: "Whether you have a question about Local Loop, want to explore how membership could benefit your business, or just want to say hello — we'd love to hear from you."
  formAction: "https://mailygo-production.up.railway.app/"
  fields:
    - name: "name"
      label: "Your Name"
      type: "text"
      placeholder: "Full name"
      required: true
    - name: "email"
      label: "Email Address"
      type: "email"
      placeholder: "you@yourbusiness.co.uk"
      required: true
    - name: "phone"
      label: "Phone (optional)"
      type: "tel"
      placeholder: "07xxx xxx xxx"
      required: false
    - name: "message"
      label: "Message"
      type: "textarea"
      placeholder: "How can we help?"
      required: true
  ctaText: "Send Message"
  successMessage: "Thanks for getting in touch! We'll get back to you as soon as we can."

enquire:
  heading: "Enquire About Founding Membership"
  description: "Join us in making Merseyside the most collaborative business region in the UK. Here's what Founding Membership involves."
  whatWeAsk:
    heading: "What we ask"
    items:
      - "Help us create a few marketing assets — photos, short video clips, a brief endorsement quote."
      - "Two or three introductions to businesses you trade with who could benefit from Local Loop. We'll take it from there — and we can help you choose."
  whatYouGet:
    heading: "What you get"
    items:
      - "A Local Loop Founding Member badge graphic to use however you like."
      - "LinkedIn spotlight posts featuring your business (minimum 5 across 6 months)."
      - "Your business identified as a Founding Member on the Local Loop website."
      - "PR support on other activity, where practical."
      - "If you join the paid tier, your first year's membership is free."
  formAction: "https://mailygo-production.up.railway.app/"
  fields:
    - name: "businessName"
      label: "Business Name"
      type: "text"
      placeholder: "Your business name"
      required: true
    - name: "contactName"
      label: "Contact Name"
      type: "text"
      placeholder: "Full name"
      required: true
    - name: "email"
      label: "Email Address"
      type: "email"
      placeholder: "you@yourbusiness.co.uk"
      required: true
    - name: "phone"
      label: "Phone (optional)"
      type: "tel"
      placeholder: "07xxx xxx xxx"
      required: false
    - name: "message"
      label: "Tell us about your business"
      type: "textarea"
      placeholder: "What does your business do? Why are you interested in Local Loop?"
      required: false
  ctaText: "Submit Enquiry"
  successMessage: "Thanks for your interest! We'll be in touch shortly to discuss Founding Membership."

